<div style="margin:0;padding:0;background:#f7f8f5;font-family:Arial,Helvetica,sans-serif;color:#171717;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse;background:#f7f8f5;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;border-collapse:collapse;background:#ffffff;border:1px solid #dfdfdf;border-radius:12px;overflow:hidden;">
          <tr>
            <td style="padding:28px 28px 10px;">
              <div style="font-size:22px;font-weight:800;letter-spacing:-0.02em;color:#171717;">AxLiner</div>
              <h1 style="margin:28px 0 12px;font-size:26px;line-height:1.2;color:#171717;">Sign in to your workspace</h1>
              <p style="margin:0;color:#525252;font-size:15px;line-height:1.7;">
                Use this secure link to continue to AxLiner and manage your document-to-Excel batches.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 28px 30px;">
              <a href="{{ .RedirectTo }}&token_hash={{ .TokenHash }}&type=email" style="display:inline-block;background:#72e3ad;color:#1e2723;text-decoration:none;font-weight:700;font-size:15px;border-radius:8px;padding:13px 18px;">
                Sign in securely
              </a>
              <p style="margin:22px 0 0;color:#707070;font-size:13px;line-height:1.6;">
                If you did not request this email, you can ignore it. This link is time limited.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</div>
