          - heading "What is Axliner?" [level=2] [ref=e405]
          - generic [ref=e407]:
            - paragraph [ref=e411]: Axliner is a 7-billion parameter vision-language model fine-tuned from Meta's Llama 3 family for handwritten tables, forms, and spreadsheet-like documents. It understands document structure first, so the result is usable rows, columns, headers, and values.
            - paragraph [ref=e417]: During conversion, Axliner cleans the image, detects table regions, reads handwriting, and keeps cell relationships intact. It was trained on diverse handwritten datasets, table extraction data, and augmented noisy documents, so dense notes and phone photos can still become structured spreadsheets.
            - paragraph [ref=e421]: The workflow is designed for batch processing. Upload several images, watch progress as each page finishes, then download clean Excel files ready for review, reporting, editing, or sharing without losing the table logic people need in the final workbook.
