          - heading "What is Axliner?" [level=2] [ref=e384]
          - generic [ref=e385]:
            - generic [ref=e387]:
              - paragraph [ref=e388]: Axliner is a 7-billion parameter vision-language model a fine-tuned Meta's Llama 3 Model. The model underwent extensive instruction fine-tuning specifically optimized for handwritten text recognition, table structure preservation, and multi-language document understanding.
              - paragraph [ref=e389]: Unlike generic OCR systems, Axliner was trained on diverse handwritten datasets including the IAM Handwriting Database, proprietary table extraction datasets, and synthetic augmented data. The fine-tuning process focused on preserving table semantics, cell relationships, and hierarchical document structures — achieving 96.8% accuracy on complex handwritten tables.
              - paragraph [ref=e390]: The system supports batch processing using your live plan limit, with real-time conversion progress as each page finishes. Axliner handles 8+ languages including complex scripts like Arabic and Chinese, while maintaining cell relationships and formatting integrity across all output formats.
              - paragraph [ref=e391]: Built for enterprise workflows, Axliner excels in financial document processing, invoice digitization, form automation, and archive digitization — trained on over 2 million handwritten samples using a Llama 3-based vision-language transformer architecture.
            - generic "Axliner automation pipeline" [ref=e392]:
