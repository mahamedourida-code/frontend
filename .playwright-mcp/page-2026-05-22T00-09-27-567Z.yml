              - heading "OCR infrastructure controlled around your batch workflow." [level=2] [ref=e857]
              - paragraph [ref=e858]: AxLiner controls queue admission, file ownership, recovery, exports, and download permissions around the model call. That is the difference between a demo wrapper and a product that can survive real batch work.
            - generic [ref=e859]:
              - img "AxLiner server processing layer" [ref=e861]
              - generic [ref=e862]:
                - generic [ref=e863]:
                  - paragraph [ref=e864]: "01"
